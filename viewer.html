<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Viewer</title>

<style>
body {
    margin: 0;
    background: #1e1e1e;
    display: flex;
    justify-content: center;
}
iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe id="pdfFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
    document.getElementById("pdfFrame").src = "pdf/" + file;
}else{
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>未指定PDF文件</h2>";
}
</script>

</body>
</html>
