<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF二维码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
    background: #f5f5f5;
}
input {
    width: 80%;
    padding: 10px;
    margin-top: 20px;
}
button {
    margin-top: 10px;
    padding: 10px 20px;
    cursor: pointer;
}
#qrcode {
    margin-top: 30px;
}
</style>
</head>

<body>

<h2>📄 PDF 二维码生成器</h2>

<p>输入 PDF 文件名（例如：格聂牧场+C.pdf）</p>

<input id="file" placeholder="格聂牧场+C.pdf">
<br>
<button onclick="genQR()">生成二维码</button>

<div id="qrcode"></div>

<script>
function genQR(){
    const file = document.getElementById("file").value;

    const url = window.location.origin + "/pdfshare/viewer.html?file=" + file;

    document.getElementById("qrcode").innerHTML = "";

    QRCode.toCanvas(document.createElement("canvas"), url, function (error, canvas) {
        if (error) console.error(error);
        document.getElementById("qrcode").appendChild(canvas);
    });
}
</script>

</body>
</html>
